<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Number Base Conversion</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        h1 { color: #333; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .result { background: #f4f4f4; padding: 15px; border-left: 5px solid #007acc; margin-top: 10px; font-family: monospace; font-size: 1.1rem; }
    </style>
</head>
<body>

    <h1>Number-base-conversion</h1>
    <p>ค่าเริ่มต้น (เลขฐาน 10): <strong>1991</strong></p>

    <div class="result">
        <div id="bin"></div>
        <div id="oct"></div>
        <div id="hex"></div>
    </div>

    <script>
        let dec = 1991;

        // แปลงเลขฐานโดยใช้ JavaScript (คล้ายๆ format ใน Python)
        document.getElementById('bin').innerText = "ฐาน 2: " + dec.toString(2);
        document.getElementById('oct').innerText = "ฐาน 8: " + dec.toString(8);
        document.getElementById('hex').innerText = "ฐาน 16: " + dec.toString(16).toUpperCase();
    </script>

</body>
</html>
